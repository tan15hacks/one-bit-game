name: one_bit_game
description: A mobile-first one-bit puzzle platformer built with Flutter, Flame, and Kenney assets.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.10.0 <4.0.0"
  flutter: ">=3.38.0"

dependencies:
  flutter:
    sdk: flutter
  # Pinned to the newest releases compatible with Dart 3.10 / Flutter 3.38.
  flame: 1.35.1
  flame_tiled: 3.0.11

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/tiles/
    - assets/tiles/
