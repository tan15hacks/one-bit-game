name: Flutter CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.5"
          channel: stable
          cache: true
      - name: Generate Android scaffold
        run: flutter create --platforms=android --org com.tan15hacks --project-name one_bit_game --no-pub .
      - run: flutter pub get
      - name: Capture Flutter analyzer report
        run: flutter analyze > analyze.log 2>&1 || true
      - name: Upload analyzer report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tutorial-analyzer-report
          path: analyze.log
      - run: flutter test
      - run: flutter build apk --debug
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: one-bit-escape-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
