name: Flutter CI

on:
  push:
    branches: [main, ci-validation]
  pull_request:

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Commit final analyzer cleanup
        if: github.event_name == 'push' && github.ref == 'refs/heads/ci-validation'
        run: |
          sed -i "/package:flame\/sprite.dart/d" lib/main.dart
          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add lib/main.dart
            git commit -m "style: remove redundant Flame import"
            git push origin HEAD:ci-validation
          fi
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Generate Android scaffold
        run: flutter create --platforms=android --org com.tan15hacks --project-name one_bit_game --no-pub .
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test
      - run: flutter build apk --debug
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: one-bit-escape-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
