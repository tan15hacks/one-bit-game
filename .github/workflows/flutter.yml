name: Flutter CI

on:
  push:
    branches: [main, ci-validation]
  pull_request:

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Commit source compatibility fix
        if: github.event_name == 'push' && github.ref == 'refs/heads/ci-validation'
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('lib/main.dart')
          source = path.read_text()
          source = source.replace(
              "import 'package:flame_tiled/flame_tiled.dart';",
              "import 'package:flame_tiled/flame_tiled.dart' hide Text;",
          )
          source = source.replace('__', '_')
          path.write_text(source)
          PY
          mkdir -p test
          cat > test/widget_test.dart <<'DART'
          import 'package:flutter_test/flutter_test.dart';
          import 'package:one_bit_game/main.dart';

          void main() {
            testWidgets('main menu renders the title and play button', (tester) async {
              await tester.pumpWidget(const OneBitApp());

              expect(find.text('ONE BIT\nESCAPE'), findsOneWidget);
              expect(find.text('PLAY'), findsOneWidget);
            });
          }
          DART
          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add lib/main.dart test/widget_test.dart
            git commit -m "fix: resolve Tiled import and generated test"
            git push origin HEAD:ci-validation
          fi
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Generate Android scaffold
        run: flutter create --platforms=android --org com.tan15hacks --project-name one_bit_game --no-pub .
      - run: flutter pub get
      - name: Analyze
        id: analyze
        continue-on-error: true
        run: |
          set -o pipefail
          flutter analyze 2>&1 | tee analyze.txt
      - name: Build Android debug APK
        id: build
        continue-on-error: true
        run: |
          set -o pipefail
          flutter build apk --debug 2>&1 | tee build.txt
      - name: Upload validation reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-validation-reports
          path: |
            analyze.txt
            build.txt
      - name: Fail when validation failed
        if: steps.analyze.outcome == 'failure' || steps.build.outcome == 'failure'
        run: exit 1
